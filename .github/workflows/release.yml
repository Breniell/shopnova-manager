name: Release (tag v*)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME          # e.g. v1.4.2
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version  # e.g. 1.4.2
          $expected = "v$pkgVersion"
          if ($tag -ne $expected) {
            Write-Error "Tag '$tag' does not match package.json version '$expected'. Bump the version before tagging."
            exit 1
          }
          Write-Host "Version check passed: $tag"

      - name: Run tests
        run: npm test

      - name: Create .env from secrets
        shell: pwsh
        run: |
          @"
          VITE_FIREBASE_API_KEY=$($env:VITE_FIREBASE_API_KEY)
          VITE_FIREBASE_AUTH_DOMAIN=$($env:VITE_FIREBASE_AUTH_DOMAIN)
          VITE_FIREBASE_PROJECT_ID=$($env:VITE_FIREBASE_PROJECT_ID)
          VITE_FIREBASE_STORAGE_BUCKET=$($env:VITE_FIREBASE_STORAGE_BUCKET)
          VITE_FIREBASE_MESSAGING_SENDER_ID=$($env:VITE_FIREBASE_MESSAGING_SENDER_ID)
          VITE_FIREBASE_APP_ID=$($env:VITE_FIREBASE_APP_ID)
          "@ | Out-File -FilePath .env -Encoding utf8
          if (-not $env:VITE_FIREBASE_API_KEY) {
            Write-Error "Secret VITE_FIREBASE_API_KEY manquant. Ajoutez les secrets Firebase dans Settings > Secrets and variables > Actions."
            exit 1
          }
          Write-Host ".env généré depuis les secrets."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build Electron + create installer
        run: npm run electron:dist:safe
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # code-signing disabled — no cert yet

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} - Legwan Complete POS
          files: |
            release/Legwan Setup *.exe
            release/Legwan Setup *.exe.blockmap
            release/latest.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}