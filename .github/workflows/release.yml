name: Release (tag v*)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version
          $expected = "v$pkgVersion"
          if ($tag -ne $expected) {
            Write-Error "Tag '$tag' does not match package.json version '$expected'."
            exit 1
          }
          Write-Host "Version check passed: $tag"

      - name: Run quality and security checks
        run: |
          npm run lint
          npm run typecheck
          npm run security:prod
          npm test
          npm run test:electron-runtime

      - name: Create .env from secrets
        shell: pwsh
        run: |
          $content = @(
            "VITE_FIREBASE_API_KEY=$env:VITE_FIREBASE_API_KEY",
            "VITE_FIREBASE_AUTH_DOMAIN=$env:VITE_FIREBASE_AUTH_DOMAIN",
            "VITE_FIREBASE_PROJECT_ID=$env:VITE_FIREBASE_PROJECT_ID",
            "VITE_FIREBASE_STORAGE_BUCKET=$env:VITE_FIREBASE_STORAGE_BUCKET",
            "VITE_FIREBASE_MESSAGING_SENDER_ID=$env:VITE_FIREBASE_MESSAGING_SENDER_ID",
            "VITE_FIREBASE_APP_ID=$env:VITE_FIREBASE_APP_ID",
            "VITE_LICENSE_PUBKEY=$env:VITE_LICENSE_PUBKEY"
          )
          $content | Out-File -FilePath .env -Encoding utf8NoBOM
          if (-not $env:VITE_FIREBASE_API_KEY) {
            Write-Error "Secret VITE_FIREBASE_API_KEY manquant."
            exit 1
          }
          if (-not $env:VITE_LICENSE_PUBKEY) {
            Write-Error "Secret VITE_LICENSE_PUBKEY manquant. Le build distribue ne peut pas verifier les licences."
            exit 1
          }
          Write-Host ".env generated from secrets."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_LICENSE_PUBKEY: ${{ secrets.VITE_LICENSE_PUBKEY }}

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron-builder\Cache
            ~\AppData\Local\electron\Cache
          key: ${{ runner.os }}-electron-builder-cache-v2

      - name: Prepare rcedit (winCodeSign) for afterPack hook
        shell: pwsh
        run: |
          $cacheRoot = "$env:LOCALAPPDATA\electron-builder\Cache\winCodeSign"
          $destDir   = "$cacheRoot\winCodeSign-2.6.0"
          if (Test-Path "$destDir\rcedit-x64.exe") {
            Write-Host "winCodeSign cache hit — skipping download"
          } else {
            New-Item -ItemType Directory -Force $destDir | Out-Null
            $archive = "$cacheRoot\winCodeSign-2.6.0.7z"
            Write-Host "Downloading winCodeSign-2.6.0..."
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest -Uri "https://github.com/electron-userland/electron-builder-binaries/releases/download/winCodeSign-2.6.0/winCodeSign-2.6.0.7z" -OutFile $archive
            $sevenZip = "$(Get-Location)\node_modules\7zip-bin\win\x64\7za.exe"
            & $sevenZip x -bd -y "$archive" "-o$destDir"
            if (-not (Test-Path "$destDir\rcedit-x64.exe")) {
              Write-Error "rcedit-x64.exe not found after extraction — check 7za output above"
              exit 1
            }
            Write-Host "winCodeSign ready"
          }

      - name: Signed release build and verification
        run: npm run release:client
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CSC_PUBLISHER: ${{ secrets.WIN_CSC_PUBLISHER }}
          WIN_CSC_SUBJECT: ${{ secrets.WIN_CSC_SUBJECT }}

      - name: Packaged offline smoke test
        run: npm run smoke:offline:packaged

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} - Legwan Complete POS
          files: |
            release/Legwan-Setup-*.exe
            release/Legwan-Setup-*.exe.blockmap
            release/latest.yml
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
