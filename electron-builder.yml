# Legwan — electron-builder configuration
# Produces a Windows NSIS installer (.exe) and a portable ZIP.

appId: cm.legwan.manager
productName: Legwan
copyright: "© 2026 Legwan. Tous droits réservés."

# ── Code signing — disabled (no certificate yet) ───────────────────────────────
# Also set CSC_IDENTITY_AUTO_DISCOVERY=false in the build script.
forceCodeSigning: false

# Electron Builder's built-in Windows resource editor currently downloads a
# winCodeSign archive that can fail on machines without symlink privileges.
# We keep that path disabled and inject the app icon/resources ourselves in
# afterPack, before NSIS creates the installer.
afterPack: scripts/after-pack-rcedit.cjs

# Keep packaged files on disk instead of app.asar: the CommonJS launcher
# dynamically imports the ESM main process, and Windows/Electron ESM resolution
# is unreliable from inside app.asar.
asar: false

# ── Files to include in the app package ────────────────────────────────────────
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  # Ensure packaged entry points are present for launcher/policy/runtime

  - "!node_modules/**/*"
  - "!src/**/*"
  - "!tests/**/*"
  - "!*.test.*"

# ── Windows configuration ──────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: zip
      arch:
        - x64
  icon: build/icon.ico
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
  # Consistent hyphenated naming so latest.yml URL matches the uploaded asset name.
  # Without this, latest.yml references "Legwan-Setup-x.y.z.exe" but the file is
  # "Legwan Setup x.y.z.exe" (with spaces), causing electron-updater to 404.
  artifactName: "${productName}-Setup-${version}.${ext}"

# ── NSIS installer wizard ──────────────────────────────────────────────────────
nsis:
  oneClick: false
  # Keep false: UAC elevation restarts the installer process causing windows
  # to flash open/close multiple times. Per-user install needs no elevation.
  allowElevation: false
  # Keep false: letting users pick the directory lets them choose Program Files,
  # which requires elevation and triggers the UAC restart loop (open/close flash).
  allowToChangeInstallationDirectory: false
  perMachine: false
  # Stable GUID ensures Windows correctly tracks installs/updates/uninstalls
  # without treating each version as a separate product.
  guid: "c8f3a1b2-4d5e-6f7a-8b9c-0d1e2f3a4b5c"
  # Custom hooks: force user-space install dir, set per-user shell context
  include: build/installer.nsh

  # French interface (fr-FR = BCP 47, language code 1036 = fr)
  installerLanguages:
    - fr-FR
  language: "1036"

  # Shortcuts
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Legwan

  # License shown INSIDE the NSIS wizard before installation
  license: build/LICENSE.rtf

  # Installer branding
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  runAfterFinish: true

# ── Auto-update (GitHub Releases) ─────────────────────────────────────────────
# electron-updater vérifie les releases GitHub au démarrage de l'app.
# Pour publier une mise à jour :
#   1. Bumper la version dans package.json (ex: 1.0.0 → 1.1.0)
#   2. npm run electron:dist
#   3. Créer une GitHub Release avec le tag vX.Y.Z et joindre les fichiers release/
publish:
  provider: github
  owner: Breniell
  repo: shopnova-manager
  releaseType: release
  private: false
